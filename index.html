<!DOCTYPE html>
 
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>MasjidQuiz</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:"Plus Jakarta Sans",sans-serif}
body{background:#f2f2f7;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:"Plus Jakarta Sans",sans-serif}
input::placeholder,textarea::placeholder{color:rgba(60,60,67,.35)}
input:focus,textarea:focus{outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:0}
@keyframes pgF{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@keyframes pgB{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:none}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{opacity:0;transform:scale(.9)}65%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes bth{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes tst{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.pf{animation:pgF .3s cubic-bezier(.25,.46,.45,.94) both}
.pb{animation:pgB .3s cubic-bezier(.25,.46,.45,.94) both}
.ri{animation:rise .4s cubic-bezier(.25,.46,.45,.94) both}
.po{animation:pop .4s cubic-bezier(.25,.46,.45,.94) both}
.fl{animation:flt 3s ease-in-out infinite}
.bt{animation:bth 2s ease-in-out infinite}
.tp{animation:tst .3s cubic-bezier(.25,.46,.45,.94) both}
.s1{animation-delay:.05s}.s2{animation-delay:.10s}.s3{animation-delay:.15s}
.s4{animation-delay:.20s}.s5{animation-delay:.25s}
.pr{transition:transform .12s,opacity .12s}
.pr:hover{opacity:.86}
.pr:active{transform:scale(.95);opacity:.75}
.gb{transition:all .18s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.gb:hover{transform:translateY(-1px);filter:brightness(1.04)}
.gb:active{transform:scale(.96)}
.gc{backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Firebase SDK via CDN ── */
const FB_CFG = {
apiKey:“AIzaSyB124EHtiyG8HskTBxba16X19nmTGJEXLQ”,
authDomain:“masjidquiz.firebaseapp.com”,
projectId:“masjidquiz”,
storageBucket:“masjidquiz.firebasestorage.app”,
messagingSenderId:“725271430627”,
appId:“1:725271430627:web:2f6aadb0033097368c4cd6”
};

/* Lazy-load Firebase */
let _db = null;
let _ref = null;
async function getDB() {
if (_db) return { db: _db, ref: _ref };
const { initializeApp } = await import(“https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js”);
const { getFirestore, doc, getDoc, setDoc, onSnapshot } = await import(“https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js”);
const app = initializeApp(FB_CFG);
_db = getFirestore(app);
_ref = doc(_db, “app”, “data”);
return { db: _db, ref: _ref, getDoc, setDoc, onSnapshot };
}

/* ── Helpers ── */
const uid    = () => Math.random().toString(36).slice(2,9);
const nowStr = () => new Date().toLocaleString(“de-DE”,{dateStyle:“short”,timeStyle:“short”});
const today  = () => new Date().toLocaleDateString(“de-DE”);
const qrUrl  = (t) => “https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=”+encodeURIComponent(t);
const VALID  = [“a”,“b”,“c”,“d”];
const IMAM   = “imam2024”;
const APP_URL = window.location.href.split(”?”)[0];

const EMPTY_Q = {id:null,questionCount:10,correctAnswers:[],status:“idle”,date:null,answers:{}};
const DEFAULT = {
users:[{id:“imam”,name:“Imam”,password:IMAM,role:“imam”,points:0,history:[]}],
quiz:EMPTY_Q, announcements:[], sessions:[], currentSessionId:null
};

async function readDB() {
try {
const { ref, getDoc } = await getDB();
const s = await getDoc(ref);
return s.exists() ? s.data().state : DEFAULT;
} catch(e) { console.error(“readDB”,e); return DEFAULT; }
}
async function writeDB(d) {
try {
const { ref, setDoc } = await getDB();
await setDoc(ref, {state:d});
} catch(e) { console.error(“writeDB”,e); }
}

/* ── Styles ── */
const S = {
app:   {background:“linear-gradient(145deg,#e8f0fe 0%,#f2f2f7 40%,#fef0fb 100%)”,minHeight:“100vh”,maxWidth:480,margin:“0 auto”,position:“relative”,overflow:“hidden”},
b1:    {position:“fixed”,top:-120,right:-80,width:340,height:340,borderRadius:“50%”,background:“radial-gradient(circle,rgba(0,122,255,.18) 0%,transparent 70%)”,pointerEvents:“none”,zIndex:0},
b2:    {position:“fixed”,bottom:60,left:-100,width:300,height:300,borderRadius:“50%”,background:“radial-gradient(circle,rgba(88,86,214,.14) 0%,transparent 70%)”,pointerEvents:“none”,zIndex:0},
b3:    {position:“fixed”,top:“40%”,right:-60,width:200,height:200,borderRadius:“50%”,background:“radial-gradient(circle,rgba(255,55,95,.1) 0%,transparent 70%)”,pointerEvents:“none”,zIndex:0},
pw:    {flex:1,display:“flex”,flexDirection:“column”,position:“relative”,zIndex:1},
nav:   {position:“fixed”,bottom:0,left:“50%”,transform:“translateX(-50%)”,width:“100%”,maxWidth:480,display:“flex”,background:“rgba(242,242,247,.88)”,backdropFilter:“blur(30px)”,WebkitBackdropFilter:“blur(30px)”,borderTop:“1px solid rgba(255,255,255,.5)”,zIndex:100,boxShadow:“0 -1px 0 rgba(60,60,67,.12)”},
nb:    {flex:1,display:“flex”,flexDirection:“column”,alignItems:“center”,padding:“10px 4px 8px”,background:“none”,border:“none”,position:“relative”,transition:“color .15s”},
nd:    {position:“absolute”,top:0,left:“50%”,transform:“translateX(-50%)”,width:28,height:3,borderRadius:2,background:”#007AFF”},
toast: {position:“fixed”,bottom:96,left:“50%”,transform:“translateX(-50%)”,backdropFilter:“blur(20px)”,WebkitBackdropFilter:“blur(20px)”,border:“1px solid”,borderRadius:24,padding:“11px 24px”,fontWeight:700,fontSize:14,zIndex:200,whiteSpace:“nowrap”,boxShadow:“0 8px 32px rgba(0,0,0,.12)”},
sync:  {position:“fixed”,top:12,right:16,zIndex:300,background:“rgba(0,122,255,.15)”,border:“1px solid rgba(0,122,255,.3)”,borderRadius:20,padding:“5px 14px”,fontSize:12,fontWeight:700,color:”#007AFF”,backdropFilter:“blur(20px)”,WebkitBackdropFilter:“blur(20px)”},
scr:   {display:“flex”,flexDirection:“column”,minHeight:“100vh”},
scrc:  {display:“flex”,flexDirection:“column”,minHeight:“100vh”,justifyContent:“center”,alignItems:“center”},
nbar:  {display:“flex”,justifyContent:“space-between”,alignItems:“center”,padding:“16px 20px 12px”,background:“rgba(242,242,247,.88)”,backdropFilter:“blur(20px)”,WebkitBackdropFilter:“blur(20px)”,borderBottom:“1px solid rgba(60,60,67,.1)”,position:“sticky”,top:0,zIndex:10},
card:  {background:“rgba(255,255,255,.6)”,border:“1px solid rgba(255,255,255,.85)”,borderRadius:24,padding:“20px 20px”,boxShadow:“0 6px 28px rgba(0,0,0,.07)”},
inp:   {width:“100%”,background:“rgba(118,118,128,.1)”,border:“1.5px solid rgba(60,60,67,.12)”,borderRadius:14,color:”#1c1c1e”,padding:“13px 16px”,fontSize:15,display:“block”,transition:“border-color .18s”},
lbl:   {display:“block”,fontSize:13,fontWeight:600,color:“rgba(60,60,67,.55)”,marginBottom:7},
pbtn:  {width:“100%”,background:”#007AFF”,border:“none”,borderRadius:16,color:”#fff”,padding:“15px 0”,fontWeight:800,fontSize:16,letterSpacing:”-.2px”,boxShadow:“0 4px 16px rgba(0,122,255,.4)”,cursor:“pointer”,transition:“all .18s”},
gbtn:  {width:“100%”,background:“rgba(60,60,67,.07)”,border:“1px solid rgba(60,60,67,.12)”,borderRadius:16,color:“rgba(60,60,67,.7)”,padding:“13px 0”,fontWeight:700,fontSize:15,cursor:“pointer”,transition:“all .18s”},
tbtn:  {width:“100%”,background:“none”,border:“none”,color:”#007AFF”,fontWeight:700,fontSize:15,cursor:“pointer”},
epill: {background:“rgba(255,55,95,.1)”,border:“1px solid rgba(255,55,95,.3)”,borderRadius:14,padding:“11px 16px”,color:”#ff375f”,fontWeight:700,fontSize:14,marginBottom:10},
bkbtn: {background:“rgba(0,122,255,.1)”,border:“none”,borderRadius:12,padding:“8px 14px”,fontWeight:700,color:”#007AFF”,fontSize:16,cursor:“pointer”},
};

/* ── Shared Components ── */
function Blobs() {
return <><div style={S.b1}/><div style={S.b2}/><div style={S.b3}/></>;
}
function NavBar({title, onBack, right}) {
return (
<div style={S.nbar}>
<button className="pr" onClick={onBack} style={S.bkbtn}>←</button>
<span style={{fontWeight:800,fontSize:16,color:”#1c1c1e”,letterSpacing:”-.3px”}}>{title}</span>
<div style={{minWidth:44,display:“flex”,justifyContent:“flex-end”}}>{right||<span/>}</div>
</div>
);
}
function Field({label,value,set,ph,type=“text”,onEnter}) {
return (
<div style={{marginBottom:14}}>
<label style={S.lbl}>{label}</label>
<input
type={type} value={value} placeholder={ph}
onChange={e=>set(e.target.value)}
onKeyDown={e=>e.key===“Enter”&&onEnter&&onEnter()}
style={S.inp}
onFocus={e=>{e.target.style.borderColor=”#007AFF”}}
onBlur={e=>{e.target.style.borderColor=“rgba(60,60,67,.12)”}}
/>
</div>
);
}
function PBtn({children,onClick,disabled,mt=0,color,flex}) {
const bg = disabled ? “rgba(60,60,67,.1)” : (color||”#007AFF”);
const sh = disabled ? “none” : (“0 4px 16px “+(color||”#007AFF”)+“44”);
return (
<button className=“pr gb” onClick={onClick} disabled={disabled}
style={{…S.pbtn,background:bg,boxShadow:sh,color:disabled?“rgba(60,60,67,.3)”:”#fff”,marginTop:mt,cursor:disabled?“not-allowed”:“pointer”,…(flex?{flex:1,width:“auto”}:{})}}>
{children}
</button>
);
}
function GBtn({children,onClick,mt=0,flex}) {
return (
<button className=“pr gb” onClick={onClick}
style={{…S.gbtn,marginTop:mt,…(flex?{flex:1,width:“auto”}:{})}}>
{children}
</button>
);
}
function MsgPage({icon,title,sub,onBack,doFloat}) {
return (
<div style={S.scrc}>
<div className=“po” style={{textAlign:“center”,padding:32}}>
<div className={doFloat?“fl”:””} style={{fontSize:64}}>{icon}</div>
<p style={{fontWeight:800,fontSize:20,color:”#1c1c1e”,marginTop:16}}>{title}</p>
<p style={{color:“rgba(60,60,67,.5)”,marginTop:8}}>{sub}</p>
<button className="pr" onClick={onBack} style={{...S.tbtn,marginTop:28}}>← Zurück</button>
</div>
</div>
);
}

/* ── App Root ── */
function App() {
const [data,   setData]   = useState(null);
const [me,     setMe]     = useState(null);
const [screen, setScreen] = useState(“login”);
const [dir,    setDir]    = useState(“fwd”);
const [toast,  setToast]  = useState(null);
const [sync,   setSync]   = useState(false);
const unsubRef = useRef(null);

/* Check-in param */
useEffect(()=>{
const p = new URLSearchParams(window.location.search);
if(p.get(“checkin”)===“1”) sessionStorage.setItem(“ci”,“1”);
},[]);

/* Firestore realtime */
useEffect(()=>{
let cancel = false;
(async()=>{
const initial = await readDB();
if(!cancel) setData(initial);
const { ref, onSnapshot } = await getDB();
const unsub = onSnapshot(ref, snap=>{
if(snap.exists()&&!cancel) setData(snap.data().state);
});
unsubRef.current = unsub;
})();
return ()=>{ cancel=true; if(unsubRef.current) unsubRef.current(); };
},[]);

/* Keep me fresh */
useEffect(()=>{
if(!me||!data) return;
const f = data.users?.find(u=>u.id===me.id);
if(f && JSON.stringify(f)!==JSON.stringify(me)) setMe(f);
},[data]);

const upd = useCallback(async(fn)=>{
setSync(true);
const cur = await readDB();
const nxt = fn(cur);
await writeDB(nxt);
setSync(false);
return nxt;
},[]);

const msg = (m,w=false)=>{ setToast({m,w}); setTimeout(()=>setToast(null),2600); };
const go   = s=>{ setDir(“fwd”);  setScreen(s); };
const back = s=>{ setDir(“back”); setScreen(s); };

if(!data) return (
<div style={{…S.scrc,background:“linear-gradient(145deg,#e8f0fe,#f2f2f7,#fef0fb)”,minHeight:“100vh”}}>
<Blobs/>
<div className=“po” style={{textAlign:“center”,position:“relative”,zIndex:1}}>
<div className="fl" style={{fontSize:64,marginBottom:16}}>🕌</div>
<p style={{fontWeight:800,fontSize:22,color:”#1c1c1e”}}>MasjidQuiz</p>
<p style={{color:“rgba(60,60,67,.5)”,marginTop:8}}>Verbindet mit Server…</p>
</div>
</div>
);

const {users,quiz,announcements,sessions=[],currentSessionId} = data;
const isImam = me?.role===“imam”;

/* Checkin */
const checkin = async(user)=>{
await upd(p=>{
const sess = […(p.sessions||[])];
let sid = p.currentSessionId;
let s = sess.find(x=>x.id===sid);
if(!s||s.date!==today()){ sid=uid(); s={id:sid,date:today(),attendees:[]}; sess.push(s); }
if(!s.attendees.find(a=>a.userId===user.id)) s.attendees.push({userId:user.id,name:user.name,time:nowStr()});
return {…p,sessions:sess.map(x=>x.id===sid?s:x),currentSessionId:sid};
});
};

/* Auth */
const login = async(name,pw)=>{
const f = await readDB();
const u = f.users.find(u=>u.name.toLowerCase()===name.toLowerCase()&&u.password===pw);
if(!u) return “Name oder Passwort falsch.”;
setData(f); setMe(u);
if(sessionStorage.getItem(“ci”)===“1”&&u.role===“youth”){ sessionStorage.removeItem(“ci”); await checkin(u); msg(“✓ Anwesenheit gespeichert!”); }
go(“home”); return null;
};
const register = async(name,pw)=>{
if(!name.trim()||!pw.trim()) return “Bitte alle Felder ausfüllen.”;
const f = await readDB();
if(f.users.find(u=>u.name.toLowerCase()===name.toLowerCase())) return “Name bereits vergeben.”;
if(pw.length<4) return “Passwort min. 4 Zeichen.”;
const u={id:uid(),name:name.trim(),password:pw,role:“youth”,points:0,history:[]};
const nxt={…f,users:[…f.users,u]};
await writeDB(nxt); setData(nxt); setMe(u);
if(sessionStorage.getItem(“ci”)===“1”){ sessionStorage.removeItem(“ci”); await checkin(u); msg(“✓ Anwesenheit gespeichert!”); }
go(“home”); return null;
};
const logout = ()=>{ setMe(null); setScreen(“login”); };

/* Quiz */
const setupQuiz = async(cnt,ans)=>{ await upd(p=>({…p,quiz:{id:uid(),questionCount:cnt,correctAnswers:ans,status:“idle”,date:today(),answers:{}}})); msg(“Quiz gespeichert ✓”); };
const openQuiz  = async()=>{ await upd(p=>({…p,quiz:{…p.quiz,status:“open”}})); msg(“Quiz gestartet 🟢”); };
const closeQuiz = async(force=false)=>{
const cur = await readDB();
const yth = cur.users.filter(u=>u.role===“youth”);
const miss = yth.filter(u=>!cur.quiz.answers[u.id]).length;
if(!force&&miss>0) return {warn:miss+” haben noch nicht geantwortet.”};
await upd(p=>{
if(p.quiz.status!==“open”) return p;
const q=p.quiz;
const uu=p.users.map(u=>{
const ans=q.answers[u.id]; if(!ans) return u;
const score=q.correctAnswers.reduce((a,c,i)=>a+((ans[i]||””).toLowerCase()===c.toLowerCase()?1:0),0);
return {…u,points:u.points+score,history:[…(u.history||[]),{date:q.date,score,total:q.questionCount}]};
});
return {…p,users:uu,quiz:{…q,status:“closed”}};
});
msg(“Ausgewertet 🔒”); return null;
};
const reveal    = async()=>{ await upd(p=>({…p,quiz:{…p.quiz,status:“revealed”}})); msg(“Rangliste aufgedeckt 🏆”); };
const resetQuiz = async()=>{ await upd(p=>({…p,quiz:EMPTY_Q})); msg(“Bereit 🔄”); };
const submitAns = async(ans)=>{ if(isImam) return; await upd(p=>({…p,quiz:{…p.quiz,answers:{…p.quiz.answers,[me.id]:ans}}})); back(“home”); };

/* Users */
const delUser = async(id)=>{ await upd(p=>({…p,users:p.users.filter(u=>u.id!==id)})); msg(“Gelöscht”); };
const resetPw = async(id,pw)=>{ await upd(p=>({…p,users:p.users.map(u=>u.id===id?{…u,password:pw}:u)})); msg(“Passwort geändert ✓”); };

/* Announcements */
const addAnn = async(a)=>{ await upd(p=>({…p,announcements:[a,…p.announcements]})); msg(“Veröffentlicht 📢”); };
const delAnn = async(id)=>{ await upd(p=>({…p,announcements:p.announcements.filter(a=>a.id!==id)})); };
const rsvp   = async(id)=>{ await upd(p=>({…p,announcements:p.announcements.map(a=>{ if(a.id!==id) return a; const att=a.attending||[]; return {…a,attending:att.includes(me.id)?att.filter(x=>x!==me.id):[…att,me.id]}; })})); };

/* Derived */
const youth  = users.filter(u=>u.role===“youth”);
const scored = […youth].sort((a,b)=>b.points-a.points).map(u=>{ const ans=quiz.answers[u.id]; return {…u,quizScore:ans?quiz.correctAnswers.reduce((a,c,i)=>a+((ans[i]||””).toLowerCase()===c.toLowerCase()?1:0),0):null}; });
const answered = !!quiz.answers[me?.id];
const curSess  = sessions.find(s=>s.id===currentSessionId);
const todayN   = curSess?.attendees?.length||0;
const ciLink   = APP_URL+”?checkin=1”;

const navItems = [
{icon:“🏠”,label:“Home”,  s:“home”},
{icon:“❓”,label:“Quiz”,  s:“quiz”},
{icon:“🏆”,label:“Top”,   s:“rank”},
{icon:“📢”,label:“News”,  s:“news”},
…(isImam?[{icon:“⚙️”,label:“Admin”,s:“admin”}]:[]),
];

const screenMap = {
login:      <LoginPage onLogin={login} onGoReg={()=>go(“register”)}/>,
register:   <RegisterPage onRegister={register} onBack={()=>back(“login”)}/>,
home:       me && <HomePage me={me} quiz={quiz} announcements={announcements} answered={answered} isImam={isImam} todayN={todayN} go={go} onLogout={logout}/>,
quiz:       me && <QuizPage quiz={quiz} isImam={isImam} onSubmit={submitAns} onBack={()=>back(“home”)}/>,
rank:       me && <RankPage quiz={quiz} scored={scored} me={me} isImam={isImam} onReveal={reveal} onBack={()=>back(“home”)}/>,
news:       me && <NewsPage announcements={announcements} me={me} isImam={isImam} users={users} onAdd={addAnn} onDel={delAnn} onRsvp={rsvp} onBack={()=>back(“home”)}/>,
attendance: me && <AttPage sessions={sessions} onBack={()=>back(“admin”)} ciLink={ciLink}/>,
admin:      me&&isImam && <AdminPage quiz={quiz} youth={youth} scored={scored} todayN={todayN} onSetup={setupQuiz} onOpen={openQuiz} onClose={closeQuiz} onReveal={reveal} onReset={resetQuiz} onDelUser={delUser} onResetPw={resetPw} onBack={()=>back(“home”)} go={go}/>,
};

return (
<div style={S.app}>
<Blobs/>
{sync && <div style={S.sync}>⟳ Sync…</div>}
<div key={screen} className={dir===“back”?“pb”:“pf”} style={S.pw}>
{screenMap[screen]||null}
</div>
{me && (
<nav style={S.nav}>
{navItems.map(({icon,label,s})=>(
<button key={s} onClick={()=>go(s)} style={{…S.nb,color:screen===s?”#007AFF”:“rgba(60,60,67,.5)”}}>
{screen===s && <span style={S.nd}/>}
<span style={{fontSize:24,lineHeight:1}}>{icon}</span>
<span style={{fontSize:10,marginTop:3,fontWeight:screen===s?700:500}}>{label}</span>
</button>
))}
</nav>
)}
{toast && (
<div className=“tp” style={{…S.toast,background:toast.w?“rgba(255,149,0,.15)”:“rgba(52,199,89,.15)”,borderColor:toast.w?“rgba(255,149,0,.4)”:“rgba(52,199,89,.4)”,color:toast.w?”#b45000”:”#1a6e33”}}>
{toast.m}
</div>
)}
</div>
);
}

/* ── Login ── */
function LoginPage({onLogin,onGoReg}) {
const [name,setName]=useState(””); const [pw,setPw]=useState(””); const [err,setErr]=useState(””); const [ld,setLd]=useState(false);
const isCI = sessionStorage.getItem(“ci”)===“1”;
const sub = async()=>{ setLd(true); const e=await onLogin(name,pw); setLd(false); if(e) setErr(e); };
return (
<div style={{…S.scrc,padding:“24px 20px”,background:“linear-gradient(155deg,#e3f2fd 0%,#f1f8e9 55%,#fff8e1 100%)”}}>
<div className=“ri” style={{width:“100%”,maxWidth:360}}>
{isCI && (
<div style={{background:“rgba(52,199,89,.12)”,border:“1px solid rgba(52,199,89,.35)”,borderRadius:18,padding:“14px 18px”,marginBottom:20,textAlign:“center”}}>
